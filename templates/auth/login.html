{% extends "base.html" %}
{% block title %}Login | TaskFlow{% endblock %}
{% block content %}
<section class="auth-wrap">
  <div class="auth-panel">
    <h1>Welcome back</h1>
    <form method="post">{% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary w-100">Login</button>
    </form>
    <a href="{% url 'password_reset' %}">Forgot password?</a>
  </div>
</section>
{% endblock %}
